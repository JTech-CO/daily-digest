name: daily-digest

# 매일 1회 09:00 KST(=00:00 UTC) 실행 (기술 백서 §0, §6)
on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 09:00 KST
  workflow_dispatch: {}    # 수동 재실행용(멱등)

permissions:
  contents: write          # 갱신된 DB를 커밋

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # 수집 → 중복제거 → 선별/재분배 → 번역 → SQLite 적재
      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm start

      # DB → 정적 사이트(public/) 재빌드
      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # DB를 리포지토리에 커밋(다음 실행이 이어서 누적)
      - name: Commit database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f daily-digest.db
          git diff --staged --quiet || git commit -m "chore: update digest $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: digest
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

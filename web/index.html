<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>daily-digest</title>
  <meta name="description" content="Hacker News · GeekNews · arXiv · Phys.org · TechXplore 5개 소스 한국어 큐레이션">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="styles.css">
  <!-- FOUC 방지: 저장된 테마를 파싱 전에 적용 -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      document.documentElement.dataset.theme = saved || 'dark';
    })();
  </script>
</head>
<body>
  <header class="statusline">
    <span class="statusline__name">daily-digest</span>
    <nav class="statusline__nav">
      <button id="prevDate" class="datenav__btn" aria-label="이전 날짜">‹</button>
      <time id="currentDate" class="datenav__date"></time>
      <button id="nextDate" class="datenav__btn" aria-label="다음 날짜">›</button>
    </nav>
    <button id="themeToggle" class="toggle" role="switch" aria-label="다크/라이트 전환">
      <span class="toggle__track"><span class="toggle__knob"></span></span>
    </button>
  </header>

  <main class="feed" id="feed" aria-live="polite"></main>

  <section class="archive" id="archive" hidden>
    <h2 class="archive__title">아카이브</h2>
    <ul class="archive__list" id="archiveList"></ul>
  </section>

  <footer class="pagefoot">
    <span id="foot"></span>
  </footer>

  <script src="app.js" type="module"></script>
</body>
</html>
